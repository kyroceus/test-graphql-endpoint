type User {
  id: Int!
  email: String!
  name: String
  posts: [Post!]!
}

type Post {
  id: Int!
  title: String!
  content: String
  published: Boolean!
  author: User!
  comments: [Comment!]!
}

type Comment {
  id: Int!
  content: String!
  post: Post!
}

type Query {
  feed: [Post!]!
  post(id: Int!): Post
}